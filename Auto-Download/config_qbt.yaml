# Auto-Download/tv_show_torrent_watcher_qbt.py config file
# 1) Add your TV show names (at least partial match in torrent titles)
# 2) Set one or more RSS feed URLs that publish torrent episodes
# 3) Configure qBittorrent web UI credentials and network settings
# 4) Run with: python Auto-Download/tv_show_torrent_watcher_qbt.py --config Auto-Download/config_qbt.yaml --run-once

shows:
  - name: "Derry Girls"
  - name: "Schitt's Creek"

rss_feeds:
  # Example: a public torrent RSS feed URL (must provide magnet links)
  - "https://thepiratebay10.xyz/rss/new/208"

qbt:
  host: "192.168.0.101" # Or localhost
  port: 8080
  username: "admin"
  password: "adminadmin"
  category: "TV"

# Where qBittorrent stores downloaded files.
save_path: "Y:/New"

# History file to avoid duplicate downloads by normalized title.
history_path: "C:/Users/mfigm/Documents/Plex-Server/Auto-Download/downloaded_history_qbt.json"

# Interval in seconds between RSS checks when not run-once.
interval: 1800

# Optional scripted override.
run_once: true
no_download: true
